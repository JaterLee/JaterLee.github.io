<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="游戏摄影日志 — 记录后院、对马岛、艾泽拉斯的每一帧画面">
  <title>摄影日志 — Jater 的游戏记录</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/gallery.css">
  <script defer src="assets/js/gallery.js"></script>
</head>
<body>

  <!-- Skip to content -->
  <a href="#main-content" class="skip-link">跳转到主内容</a>

  <!-- Header / Navigation -->
  <header class="site-header" id="site-header">
    <div class="header-inner container">
      <a href="index.html" class="logo" aria-label="Jater 的游戏记录 首页">
        <svg class="logo-icon" viewBox="0 0 40 40" width="36" height="36" aria-hidden="true">
          <path d="M20 2c-2 6-6 10-8 16-1 3 0 7 2 9 3 3 9 3 12 0 2-2 3-6 2-9-2-6-6-10-8-16z" fill="#4a7c59"/>
          <path d="M20 8c-1 3-3 5-4 8-1 2 0 3 1 4l3 2 3-2c1-1 2-2 1-4-1-3-3-5-4-8z" fill="#6b9e7a"/>
          <rect x="17" y="27" width="6" height="8" rx="2" fill="#6b4f2e"/>
        </svg>
        <span class="logo-text">摄影日志</span>
      </a>

      <nav class="nav-menu" role="navigation" aria-label="主导航">
        <a href="index.html" class="nav-link">← 返回首页</a>
        <a href="index.html#saves" class="nav-link">存档</a>
        <a href="index.html#changelog" class="nav-link">日志</a>
        <a href="gallery.html" class="nav-link active">📷 摄影</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content" class="journal-main container">

    <!-- Hero Banner -->
    <section class="journal-hero" aria-label="摄影日志概览">
      <h1 class="journal-title">📷 摄影日志</h1>
      <p class="journal-subtitle">游戏旅途中的每一帧画面</p>
      <div class="journal-stats" id="journal-stats">
        <div class="journal-stat">
          <span class="journal-stat-number" id="stat-total">--</span>
          <span class="journal-stat-label">总照片</span>
        </div>
        <div class="journal-stat">
          <span class="journal-stat-number" id="stat-days">--</span>
          <span class="journal-stat-label">拍摄日</span>
        </div>
        <div class="journal-stat">
          <span class="journal-stat-number" id="stat-games">--</span>
          <span class="journal-stat-label">游戏</span>
        </div>
      </div>
    </section>

    <!-- Game Filter -->
    <nav class="journal-filters" id="journal-filters" aria-label="按游戏筛选">
      <!-- JS populated -->
    </nav>

    <!-- Timeline -->
    <section class="journal-section" aria-labelledby="journal-heading">
      <h2 class="sr-only" id="journal-heading">摄影时间线</h2>

      <!-- Loading -->
      <div class="journal-loading" id="journal-loading">
        <div class="spinner"></div>
        <p>翻阅日志中...</p>
      </div>

      <!-- Error State -->
      <div class="error-state hidden" id="journal-error" role="alert">
        <p>无法加载摄影日志，请稍后再试。</p>
        <button class="btn btn-retry" id="btn-retry-journal">重新加载</button>
      </div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="journal-empty">
        <div class="empty-icon" aria-hidden="true">📷</div>
        <p>还没有照片</p>
        <p class="empty-hint">开始游戏，按下截图键，它们就会出现在这里</p>
      </div>

      <!-- Timeline (JS populated) -->
      <div class="journal-timeline hidden" id="journal-timeline" role="list">
        <!-- JS populated -->
      </div>
    </section>

  </main>

  <!-- Lightbox -->
  <div class="lightbox hidden" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="图片查看器">
    <div class="lightbox-bg" id="lightbox-bg"></div>
    <button class="lightbox-close" id="lightbox-close" aria-label="关闭">
      <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <button class="lightbox-prev" id="lightbox-prev" aria-label="上一张">
      <svg viewBox="0 0 24 24" width="36" height="36" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="lightbox-next" id="lightbox-next" aria-label="下一张">
      <svg viewBox="0 0 24 24" width="36" height="36" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" d="M9 18l6-6-6-6"/></svg>
    </button>
    <div class="lightbox-content" id="lightbox-content">
      <img src="" alt="" id="lightbox-img">
    </div>
    <div class="lightbox-info" id="lightbox-info">
      <span id="lightbox-game"></span>
      <span id="lightbox-date"></span>
      <span id="lightbox-resolution"></span>
      <span id="lightbox-counter"></span>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p class="footer-text">🌿 由 Grounded 爱好者用爱构建</p>
      <p class="footer-text footer-disclaimer">Grounded 是 Obsidian Entertainment 的商标。本站点与 Obsidian Entertainment 无关。</p>
    </div>
  </footer>

</body>
</html>
